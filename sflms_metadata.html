<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SFLMS OpenAPI - Service Compare</title>
<style>
  :root { --line:#222; --soft:#e8e8e8; --accent:#b7e6f2; --active:#8fd9ea; --muted:#555; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:Arial, Helvetica, sans-serif; background:#fff; color:#111; font-size:14px; }
  .top { position:sticky; top:0; z-index:20; background:#fff; border-bottom:1px solid var(--line); }
  .titlebar { display:flex; align-items:center; gap:12px; min-height:42px; padding:6px 10px; border-bottom:1px solid #777; white-space:nowrap; overflow:hidden; }
  .title { font-weight:700; margin-right:8px; }
  .label { font-size:12px; }
  button, input { font-family:inherit; }
  .toggle button { border:1px solid #777; background:#fff; padding:5px 10px; cursor:pointer; }
  .toggle button.selected { background:var(--accent); font-weight:700; }
  #search { width:290px; max-width:28vw; padding:6px 8px; border:1px solid #999; }
  #count { font-size:12px; color:#222; }
  .tabs { display:flex; align-items:stretch; overflow-x:auto; overflow-y:hidden; min-height:50px; }
  .tab { flex:0 0 auto; min-width:155px; max-width:260px; min-height:50px; border:0; border-right:1px solid var(--line); padding:10px 12px; background:#fafafa; cursor:pointer; font-size:12px; text-align:center; white-space:normal; line-height:1.25; overflow:hidden; }
  .tab:hover { background:#eaf8fc; }
  .tab.active-left { box-shadow: inset 0 -4px 0 #3089d7; font-weight:700; }
  .tab.active-right { box-shadow: inset 0 -4px 0 #111; font-weight:700; }
  .main { display:grid; grid-template-columns:1fr 1fr; min-height:calc(100vh - 93px); }
  .pane { border-right:1px solid var(--line); min-width:0; display:grid; grid-template-rows:auto 1fr; }
  .pane:last-child { border-right:0; }
  .pathbar { min-height:54px; padding:10px 12px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:center; gap:10px; text-align:center; font-family:Consolas, Monaco, monospace; font-size:18px; line-height:1.25; overflow-wrap:anywhere; }
  .pathText { flex:1 1 auto; min-width:0; overflow-wrap:anywhere; }
  .copyPathButton { flex:0 0 auto; min-width:64px; border:1px solid #777; background:#fff; padding:7px 10px; font-family:Arial, Helvetica, sans-serif; font-size:12px; line-height:1; cursor:pointer; }
  .copyPathButton:hover { background:#eaf8fc; }
  .inner { display:grid; grid-template-columns:1fr 1fr; min-height:0; }
  .side { min-width:0; border-right:1px solid var(--line); display:grid; grid-template-rows:auto 1fr; }
  .side:last-child { border-right:0; }
  .head { text-align:center; font-size:17px; padding:18px 8px; border-bottom:1px solid var(--line); }
  .body { padding:14px 0; overflow:auto; }
  .empty { color:#666; text-align:center; padding:24px; font-size:13px; }
  .typeButton { border:0; background:var(--accent); padding:8px 12px 8px 14px; font-weight:700; min-width:105px; text-align:left; cursor:pointer; display:inline-block; margin:0 0 0 0; }
  .typeButton:hover { background:#a4dfed; }
  .typeBlock.selected .typeButton { background:var(--active); outline:2px solid #6bbdd0; }
  .typeBlock { margin:0 0 12px 0; }
  .typeSuffix { color:#444; font-weight:400; font-size:12px; margin-left:6px; }
  .props { margin:8px 12px 14px 28px; max-width:calc(100% - 34px); }
  .returnProps { margin:8px 12px 14px 28px; }
  .prop { display:grid; grid-template-columns:minmax(90px,1fr) auto; gap:10px; align-items:baseline; padding:3px 0; font-size:13px; }
  .propName { font-family:Consolas, Monaco, monospace; overflow-wrap:anywhere; }
  .propType { color:#333; font-family:Consolas, Monaco, monospace; font-size:12px; text-align:right; overflow-wrap:anywhere; }
  .schemaHeading { margin:0 12px 10px; text-align:center; font-size:16px; font-weight:400; overflow-wrap:anywhere; }
  .note { color:#666; font-size:12px; margin:0 12px 12px; line-height:1.35; }
  .nested { margin-left:16px; border-left:2px solid #ddd; padding-left:10px; }
  @media (max-width:1100px) { .main { grid-template-columns:1fr; } .pane { border-right:0; border-bottom:2px solid var(--line); } }
</style>
</head>

</div>

cies are returned.","nullable":true},"includeDeeplink":{"type":"boolean","description":"If this value is true, then the search returns a deep link to the entities it returns.","nullable":true},"includeInstructorDetails":{"type":"boolean","description":"If set to true, then the search returns details about the instructor. This can be useful, for example, if you want to advertise the instructor in order to get learners excited about attending training under that instructor. If you are not using instructors, set to false.","nullable":true}}},"V1_learningplan_service_prerequisitesGroupItem":{"type":"object","description":"If the value of this is true, then this user has completed this prerequisite.","properties":{"prerequisiteComplete":{"type":"boolean","description":"If the value of this is true, then this user has completed this prerequisite.","nullable":true},"isAvailableInStudentCatalog":{"type":"boolean","description":"If the value of this is true, then this prerequisite is in this user's catalog. When it is in a user's catalog, he or she can access it and it does not need to be directly assigned.","nullable":true},"isInLearningPlan":{"type":"boolean","description":"If the value of this is true, then this prerequisite is already in this user's assignments.","nullable":true},"prerequisiteCompleteInfo":{"type":"string","description":"This is the completion information for this prerequisite for this user.","nullable":true},"prerequisiteCompletionDate":{"type":"integer","format":"int64","description":"This is the date that this user completed this prerequisite. If the value of this is null, then this user has not completed the prerequisite.","nullable":true},"prerequisiteGroupID":{"type":"string","description":"This is the unique ID of the group that this prerequisite belongs to.","nullable":true},"groupName":{"type":"string","description":"This is the name of group that this prerequisite belongs to.","nullable":true},"groupOrder":{"type":"integer","format":"int64","description":"Prerequisite groups can be sequenced. This is the sequence number of the prerequsite group.","nullable":true},"prerequisiteItemOrder":{"type":"integer","format":"int64","description":"Within the group, this is the sequence of the learning item.","nullable":true},"prerequisiteRevisionNumber":{"type":"string","description":"This is the revision number of this entity. Each revision date has a revision number. Users sometimes know the revision number of training instead of the revision date. For example, they might know that they want revision 2 of a training, regardless of the date that it was revised.","nullable":true},"title":{"type":"string","description":"This is the title of the learning item in the language of the current user (the user calling the web service). Titles can be translated using a key/value pair, where the key uniquely identifies a particular learning item's title and the values are each language's translation of the title. If you need the key that matches this value, and if the web service supports it, look in TitleLabelKey.","nullable":true},"groupNameLabelKey":{"type":"string","description":"This is the unique ID of the group name label. The system uses this ID to look up the group name in this user's language.","nullable":true},"prerequisiteComponentClassificationType":{"type":"string","description":"This is the unique ID of the classification for a learning item. It can be: It can be one of the following values: BLENDED, CONTINUOUS ONLINE ACCESS, EXTERNAL-COURSE, PHYSICAL GOOD, or TIME-BASED.","nullable":true},"prerequisiteComponentTypeID":{"type":"string","description":"Item type IDs are a critical categorization in because they determine how users are marked complete for a learning item. One item type can have completion statuses of pass and fail while another might have completion statuses of pass, fail and incomplete.","nullable":true},"prerequisiteComponentID":{"type":"string","description":"This is the unique ID of a learning item.","nullable":true},"prerequisiteRevisionDate":{"type":"integer","format":"int64","description":"This is the revision date of this entity. Learning items often have revision dates that correspond to a regulator's revision of compliance measures. Each later revision date is a later iteration of a learning item. The revision date is in Unix Epoch time.","nullable":true}}},"V1_learningplan_service_instructors":{"type":"object","description":"This is the unique ID of an instructor in the Learning Mangaement System. If the instructor is also a user (this is often the case when instructors are employees at the company), then keep in mind that this is their INSTRUCTOR ID as opposed to their LEARNER ID.","properties":{"instructorID":{"type":"string","description":"This is the unique ID of an instructor in the Learning Mangaement System. If the instructor is also a user (this is often the case when instructors are employees at the company), then keep in mind that this is their INSTRUCTOR ID as opposed to their LEARNER ID.","nullable":true},"lastName":{"type":"string","description":"This is the family name of the instructor.","nullable":true},"firstName":{"type":"string","description":"This is the given name of the instructor.","nullable":true},"middleInitial":{"type":"string","description":"This is a middle initial of the instructor.","nullable":true},"primary":{"type":"boolean","description":"If the value of this is true, then this is the primary instructor. If false, then the instructor is secondary. Primary instructors are usually the ones responsible for organizing the training, posting learning results, and hosting Virtual Learning Sessions (VLS). You can also require that primary instructors are qualified to instruct the learning item. Secondary instructors support the primary instructors.","nullable":true}}},"V1_learningplan_service_UserTodoLearningItem":{"type":"object","description":"A Stock Keeping Unit (SKU) is a unique ID of an object in learning, used for commercial tracking, inventory, and account balancing.","required":["sku"],"properties":{"sku":{"type":"string","description":"A Stock Keeping Unit (SKU) is a unique ID of an object in learning, used for commercial tracking, inventory, and account balancing.","nullable":true},"cpnt_classification":{"type":"string","description":"This is the unique ID of the classification for a learning item. It can be: It can be one of the following values: BLENDED, CONTINUOUS ONLINE ACCESS, EXTERNAL-COURSE, PHYSICAL GOOD, or TIME-BASED.,A learning item classification is a category of a course, one that explains - in general terms - how the course is offered. It used by the LMS for business rules. For example, users do not enroll into a physical good, but do enroll into a an instructor led course. You cannot change the set of values for classification (they are set by the LMS). It can be one of the following values: BLENDED: Blended items are partly led by an instructor and partly online computer based training. Often the online portion is self-paced. CONTINUOUS ONLINE ACCESS: Online courses are always available to users. EXTERNAL-COURSE: External Courses are courses that have come in through the Open Content Network (OCN). PHYSICAL GOOD: Other courses that are most often a physical material like a book or CD. TIME-BASED: Instructor-led courses are classroom based courses, but the classroom can be physical or virtual (a conference call).","nullable":true},"isUserRequestsEnabled":{"type":"boolean","description":"If the value of this is true, then users can request to be enrolled.","nullable":true},"title":{"type":"string","description":"This is the title of the learning item in the language of the current user (the user calling the web service). Titles can be translated using a key/value pair, where the key uniquely identifies a particular learning item's title and the values are each language's translation of the title. If you need the key that matches this value, and if the web service supports it, look in TitleLabelKey.","nullable":true},"description":{"type":"string","description":"This is a description of the entity. In most cases, the description is available to users to tell them about the entity.","nullable":true},"status":{"type":"string","description":"This is a comma separated list of status entries. The following are the positions in the list and what you can expect in those positions.,First position: Are the prerequisites satisfied for this learning plan item? The values can be Y or N.,Second position: What is the enrollment status of the user for this learning plan item? Possible values are E, W, P, or N. E means that the user is enrolled. W means that the user is waitlisted. The waitlist is a queue of users who are next in line if a user withdraws from a course. P means that the user is pending enrollment. Pending users are most often in the middle of an approval process to enroll. N means that the user is not enrolled.,Third position: Is a Virtual Learning Service (VLS) segment in session? The values can be Y or N,Fourth Position: Is there a segment currently happening for this course? The values can be Y or N.,Fifth position: The unique ID of the seat that the user is enrolled into. If the user is not currently enrolled into a pertinent scheduled offering, the value is -1.,Sixth position: the online status of the learning item. Possible values are -1, -2, -3, -4, -5, or -6. -1 means that the online sections of the learning item are available to be launched by the user. -2 means that the online sections are available, but the user has been locked out of the online section for some reason and is not allowed to launch it. -3 means that the online sections are not available for some reason. -4 means that the user can launch the online sections, but only during the scheduled time. If the segment is in session, the user can launch it. -5 means that the user cannot launch the online content because there is a prerequisite that the user has not yet completed. The user must complete the prerequisite and then attempt again to launch the content. -6 means that the user has already launched the content and it is in progress.,Seventh position: The status of any courses that are scheduled for this learning item (any scheduled offerings based on the learning item). Possible values are 10, 11, -1 or -3. 10 means that an offering exists and the user can enroll. 11 means that an offering exists, but the user cannot enroll. Instead, the user can waitlist and will be enrolled if an enrolled user withdraws. -1 means that no scheduled offerings are currently available. -3 means that the user has not met the prerequisites for enrollment so cannot enroll.,Eighth position: This is a unique ID (a key) that represents the association between a learning item or learning object to student. It is used when a component is assigned to a user. The system generates this unique ID to track the progress of the user in the course. Returns -1 if no key exists.,Ninth position: Has the scheduled offering for this learning item already started? The values can be Y or N.,Tenth position: Does the user need to complete a questionnaire survey for the learning item? A questionnaire survey is a set of follow-up questions after the course is completed. The values can be Y or N.,Eleventh position: Is task checklist enabled for this course? A task checklist is a standard operating procedure that someone - an observer - validates when watching a student complete a physical task. Students pass the task checklist when the observer sees the student do the tasks properly and in order. The values can be Y or N.,Twelfth position: Are task checklist observers nominated for this course? This is a stage in the observation process. The values can be Y or N.,Thirteenth position: Are task checklist observees present for this course? The values can be Y or N.,Fourteenth position: Can users make a request that this course should be offered? The values can be Y or N.,Fifteenth position: Are there any pending scheduled offering withdraw requests for the course? When users want to withdraw from the course, they can request that they be removed from the roster. The values can be Y or N.,Sixteenth position: Are there any requests pending for the course by the user? The values can be Y or N.,Seventeenth position: Can user request for task checklist observation for the course? The values can be Y or N.","nullable":true},"userID":{"type":"string","description":"The unique ID of this user.","nullable":true},"personGUID":{"type":"string","description":"This is an internally generated, immutable identifier for one person across all of SuccessFactors HCM Suite. This is different from an LMS user ID (often called STUDENT ID). The student ID is used only within the Learning Management System (LMS). It is also different from the PERSON ID, which is used throughout SAP SuccessFactors HCM Suite but is mutable. In most cases, you use the person ID when you want to call a single user throughout the suite.","nullable":true},"personExternalID":{"type":"string","description":"This is a mutable identifier for one person across all of SuccessFactors HCM Suite. This is different from an LMS user ID (often called STUDENT ID). The student ID is used only within the Learning Management System (LMS). It is also different from the PERSON GUID, which is used throughout SAP SuccessFactors HCM Suite but is immutable. In most cases, you use the person ID when you want to call a single user throughout the suite.","nullable":true},"componentTypeID":{"type":"string","description":"Item type IDs are a critical categorization in because they determine how users are marked complete for a learning item. One item type can have completion statuses of pass and fail while another might have completion statuses of pass, fail and incomplete.","nullable":true},"componentTypeDesc":{"type":"string","description":"The descriptions of item types can help you determine how the item type assigns credit.","nullable":true},"componentID":{"type":"string","description":"This is the unique ID of a learning item.","nullable":true},"componentKey":{"type":"integer","format":"int64","description":"This is the unique key for the item. It is used in some parts of application such as bookmarking where we need to save multiple entities' primary keys. It must be a long number.","nullable":true},"componentLength":{"type":"number","format":"double","description":"The sum of the length of all segments, in hours.","nullable":true},"contactHours":{"type":"number","format":"double","description":"Contact hours are the total number of hours that you expect a user to have contact with an instructor. For example, if you set up a blended learning item that has 8 total hours and, for 6 of those hours, you expect the user to be in an instructor-led segment, then the contact hours equals 6.","nullable":true},"creditHours":{"type":"number","format":"double","description":"Credit hours are the number of hours that a user earns for completing a learning event. For example, in many U.S. colleges, students attend a single class for 15 weeks, 3 days each week, and 1 hour each day. In this case, the total hours equals 45; however, the college grants 3 CREDIT HOURS for this class.","nullable":true},"cpeHours":{"type":"number","format":"double","description":"CPE is an abbreviation for \"Continuing Professional Education\" and refers to learning activities that users perform to maintain and expand the skills that their profession demands. Therefore, CPE hours are very much like credit hours, but the accumulation of CPE hours often leads to a professional certification.","nullable":true},"revisionDate":{"type":"integer","format":"int64","description":"This is the revision date of this entity. Learning items often have revision dates that correspond to a regulator's revision of compliance measures. Each later revision date is a later iteration of a learning item. The revision date is in Unix Epoch time.","nullable":true},"assignedDate":{"type":"integer","format":"int64","description":"This is the assignment date of the curriculum.","nullable":true},"availableNewRevision":{"type":"boolean","description":"If the value of this is true, then the learning item has a newer revision then the revision assigned to the user.","nullable":true},"revisionNumber":{"type":"string","description":"null","nullable":true},"requiredDate":{"type":"integer","format":"int64","description":"This is the date that the user is required to complete this entity.","nullable":true},"daysRemaining":{"type":"integer","format":"int64","description":"This is the days remaining until the user is required to complete the learning item. If it is a negative number, then it is the days that the user is overdue.","nullable":true},"addUser":{"type":"string","description":"The user type who added the learning item. A is an administrator and P is a user (for example, a supervisor).","nullable":true},"addUserName":{"type":"string","description":"The username of the user who added this course to this users's assignments.","nullable":true},"addUserTypeLabelID":{"type":"string","description":"The full name of the user type who added the learning item to the user. For example: Admin and User","nullable":true},"orderItemID":{"type":"integer","format":"int64","description":"The order ID associated with the learning item.","nullable":true},"usedOrderTicketNumber":{"type":"string","description":"Used order ticket number","nullable":true},"usedOrderTicketSequence":{"type":"integer","format":"int64","description":"Used order ticket sequence","nullable":true},"onlineLaunched":{"type":"boolean","description":"If the value of this is true, then the user has launched the online content at least once.","nullable":true},"origin":{"type":"string","description":"How the learning item came to be on the users' learning plan. For example: Curriculum.","nullable":true},"cdpGoalID":{"type":"string","description":"The continuous development plan goal ID associated with this learning item.","nullable":true},"seqNumber":{"type":"integer","format":"int64","description":"The sequence number of the learning item.","nullable":true},"scheduleID":{"type":"integer","format":"int64","description":"The unique ID of the scheduled offering.","nullable":true},"qualificationID":{"type":"string","description":"The Unique ID of a curriculum in the system.,In the context of this entity, this is the curriculum ID that put the learning item on the users' learning assignments. The learning item is part of the curriculum, the curriculum is assigned, therefore the learning item is assigned.","nullable":true},"rootQualificationID":{"type":"string","description":"This is the unique ID of the curriclum at the root of the curriculum structure. Curricula can be subcurriclua and have parent curricula. This is the ID of the curriculum at the top of the hierarchy.,In the context of this entity, this is the root curriculum ID that put the learning item on the users' learning assignments. The learning item is part of a curriculum structure (with this curriculum at its root), the curriculum structure is assigned, therefore the learning item is assigned.","nullable":true},"qualTitle":{"type":"string","description":"The title of a curriculum in the system.,In the context of this entity, this is the title of the curriculum that put the learning item on the users' learning assignments.","nullable":true},"isRequired":{"type":"boolean","description":"If the value of this is true, then the learning item is required to be completed by the user.","nullable":true},"orderItemStatusTypeID":{"type":"string","description":"The unique type ID of the order's status. The order's status defines where it is in the process of being purchased.","nullable":true},"showInCatalog":{"type":"boolean","description":"If the value of this is true, then this appears in the users' learning catalog.","nullable":true},"requirementTypeDescription":{"type":"string","description":"This is the description of the requirement type. Requirement types define the conditions that users must meet to be considered complete in the requirement (for example, number of hours from a set of learning items).","nullable":true},"requirementTypeId":{"type":"string","description":"This is the ID of the requirement type. Requirement types define the conditions that users must meet to be considered complete in the requirement (for example, number of hours from a set of learning items).","nullable":true},"hasOnlinePart":{"type":"boolean","description":"If this is true, then the entity has some online sections.","nullable":true},"itemDetailsDeeplink":{"type":"string","description":"If you requested a deep link in your search for learning items, this is populated with the link to the learning item details page. Users click the link to see the details for this learning item. If they are not already authenticated to the system, they must authenticate before they can see the page.","nullable":true},"courseDeeplink":{"type":"string","description":"If you requested a deep link in your search for learning items, and if this learning item contains online content, then this is populated with the link to the online content. Users click the link to go to the online content for this learning item. If they are not already authenticated to the system, they must authenticate before they can see the page.","nullable":true},"criteria":{"$ref":"#/components/schemas/V1_learningplan_service_criteria","description":"This is the search criteria for the entity.","nullable":true},"linkedSchedules":{"type":"array","items":{"type":"integer","format":"int64"},"description":"This is a list of all the scheduled offerings for this learning item for which the user is enrolled.","nullable":true},"programType":{"type":"string","description":"This is the program type, which defines how a user progresses through the program. It can be schedul  completion statuses of pass, fail and incomplete.","nullable":true},"componentID":{"type":"string","description":"This is the unique ID of a learning item.","nullable":true},"revisionDate":{"type":"integer","format":"int64","description":"This is the revision date of this entity. Learning items often have revision dates that correspond to a regulator's revision of compliance measures. Each later revision date is a later iteration of a learning item. The revision date is in Unix Epoch time.","nullable":true},"componentKey":{"type":"integer","format":"int64","description":"This is the unique key for the item. It is used in some parts of application such as bookmarking where we need to save multiple entities' primary keys. It must be a long number.","nullable":true},"title":{"type":"string","description":"This is the title of the learning item in the language of the current user (the user calling the web service). Titles can be translated using a key/value pair, where the key uniquely identifies a particular learning item's title and the values are each language's translation of the title. If you need the key that matches this value, and if the web service supports it, look in TitleLabelKey.","nullable":true},"description":{"type":"string","description":"This is the description of the learning item in the language of the current user (the user calling the web service). A description is intended to provide details to users so that they can decide if they are interested in the course. Descriptions can be translated using a key/value pair, where the key uniquely identifies a particular learning item's description and the values are each language's translation of the description. If you need the key that matches this value, look in DescriptionLabelKey.","nullable":true},"htmlDescription":{"type":"string","description":"This is the description of the learning item, in the users' language, with HTML tags to format the description. Customers often use simple inline tags to bold and italicize words (for example).","nullable":true},"revisionNo":{"type":"string","description":"This is the revision number of this entity. Each revision date has a revision number. Users sometimes know the revision number of training instead of the revision date. For example, they might know that they want revision 2 of a training, regardless of the date that it was revised.","nullable":true},"sourceID":{"type":"string","description":"The source is the developer of the learning item or the organization or regulatory body that requires it. You can create or modify source IDs in the administration environment, in References: Learning: Item Sources.","nullable":true},"domainID":{"type":"string","description":"This is the security domain ID of the entity. You can associate a record with an access domain to control the administrators who can access the record. What an administrator can access and do for a record depends on how you configured the entity, function, and workflow domain restrictions of the role ID that is associated with the administrator.","nullable":true},"deliveryMethodID":{"type":"string","description":"This is the unique ID of a delivery method. A delivery method describes how a learning item will be delivered (for example, a book, PDF file, or online course). You can create or modify method IDs in the administration environment, in References: Learning: Delivery Methods","nullable":true},"requirementTypeID":{"type":"string","description":"This is the unique ID of a requirement type.,A requirement type is a way for companies to describe how a user can meet the requirement. For example, a user can finish a set amount of hours from within a pool of learning items.","nullable":true},"safetyRelated":{"type":"boolean","description":"If a learning item is safety related (if safetyRelated is true) then the learning item is flagged as safety-related in searches and reports. This information is for administrative purposes. It is not in the end-user interface by default.","nullable":true},"approved":{"type":"boolean","description":"If the user is approved to enroll into the learning item, the value is true. If the user is not approved, the value is false.","nullable":true},"notActive":{"type":"boolean","description":"If the value is false then the user is active. If the value is true, then the user is inactive.","nullable":true},"reviserName":{"type":"string","description":"This is the name of the user who revised the learning item.","nullable":true},"approvedBy":{"type":"string","description":"This is the name of the user who approved the learning item.","nullable":true},"approvalTimestamp":{"type":"integer","format":"int64","description":"This is the time that the person in charge of the approval granted the approval for the entity.","nullable":true},"lessionPlanFilename":{"type":"string","description":"This is the lesson plan that goes with the learning item. For example, it can be a valid URL to an online lesson plan or a name of a training document. Administrators or trainers can consult the lesson plan to help them prepare for the learning item.","nullable":true},"targetAudience":{"type":"string","description":"This is a description of the intended target audience that the you can display in the user interface. It helps users understand who the course is planned to address.","nullable":true},"contactName":{"type":"string","description":"The contact name is someone who can answer questions about the learning item.","nullable":true},"contactHours":{"type":"number","format":"double","description":"Contact hours are the total number of hours that you expect a user to have contact with an instructor. For example, if you set up a blended learning item that has 8 total hours and, for 6 of those hours, you expect the user to be in an instructor-led segment, then the contact hours equals 6.,The hours can be inherited from the learning event (the course) or they can be specified when a user, supervisor, or administrator records completion with the Record Learning wizard.","nullable":true},"creditHours":{"type":"number","format":"double","description":"Credit hours are the number of hours that a user earns for completing a learning event. For example, in many U.S. colleges, students attend a single class for 15 weeks, 3 days each week, and 1 hour each day. In this case, the total hours equals 45; however, the college grants 3 CREDIT HOURS for this class.,The hours can be inherited from the learning event (the course) or they can be specified when a user, supervisor, or administrator records completion with the Record Learning wizard.","nullable":true},"cpeHours":{"type":"number","format":"double","description":"CPE is an abbreviation for \"Continuing Professional Education\" and refers to learning activities that users perform to maintain and expand the skills that their profession demands. Therefore, CPE hours are very much like credit hours, but the accumulation of CPE hours often leads to a professional certification.,The hours can be inherited from the learning event (the course) or they can be specified when a user, supervisor, or administrator records completion with the Record Learning wizard.","nullable":true},"defaultInitialNumber":{"type":"integer","format":"int64","description":"The initial number is the number of days, weeks, months, quarters, or years that the user has in their initial retraining period for this learning item. Retraining periods apply when the learning item is a member of a curriculum. It is the grace period when users are first assigned a learning item. Although they might be required to retrain on the learning item every year, they might be assigned the curriculum (and learning item) in the last month of the year. The initial period gives them a grace period to complete the first training.","nullable":true},"defaultInitialPeriodTypeID":{"type":"string","description":"This is the unit for the initial period (days, weeks months, quarters, or years).","nullable":true},"defaultInitialBasisTypeID":{"type":"string","description":"The basis type can be calendar or event. In a calendar basis type, the user must retrain on a learning item on a time-interval based on the calendar (like every month). In an event, the period is based on an event, like completing the first round of training.","nullable":true},"initialPeriodLabelID":{"type":"string","description":"The label ID for the initial period, so that you can look up the language.","nullable":true},"initialBasisLabelID":{"type":"string","description":"The label ID for the initial basis, so that you can look up the exact language.","nullable":true},"defaultRetrainingNumber":{"type":"integer","format":"int64","description":"After the initial period, users must retrain. This is the number of days, weeks, months, quarters, or years that the users have to complete the retraining on the learning item.","nullable":true},"defaultRetrainingPeriodTypeID":{"type":"string","description":"The period that a user must retrain after the initial period. This can be days, weeks, months, quarters, or years.","nullable":true},"defaultRetrainingBasisTypeID":{"type":"string","description":"The retraining period type can be either calendar or event. If it is calendar, then the user must retrain based on a time-based interval (such as annually, regardless of when the user completed the last training). If it is event, then the user must retrain based on an event (such as a year after completing the training).","nullable":true},"retrainingPeriodLabelID":{"type":"string","description":"The label ID for the retraining period, so that you can look up the language.","nullable":true},"retrainingBasisLabelID":{"type":"string","description":"The label ID for the training basis, so that you can look up the language.","nullable":true},"comments":{"type":"string","description":"Comments from the instructor.","nullable":true},"instructorMaterials":{"type":"string","description":"This is materials that the instructor should have for the learning item.","nullable":true},"studentMaterials":{"type":"string","description":"This is materials that the student (learner) should have for the learning item.","nullable":true},"gradingOption":{"type":"integer","format":"int64","description":"This is the grading option of the learning item. You can see the grading options in the administration environment on the learning item record in the Grading Options view.","nullable":true},"createTimestamp":{"type":"integer","format":"int64","description":"The time stamp, in Unix Epoch, that the learning item was created","nullable":true},"componentGoals":{"type":"string","description":"These are the goals that are associated with this learning item.","nullable":true},"lastUpdateUser":{"type":"string","description":"This is the user who most recently updated the entity.","nullable":true},"totalLength":{"type":"number","format":"double","description":"This is the total length of time that the course takes. Typically, this is used for planning purposes.","nullable":true},"prepLength":{"type":"number","format":"double","description":"This is the total length of time that it takes an instructor to prepare to teach the course. Typically, this is used for planning purposes.","nullable":true},"minEnrollment":{"type":"integer","format":"int64","description":"This is the minimum amount of users who must enroll into the course for the course to take place.","nullable":true},"maxEnrollment":{"type":"integer","format":"int64","description":"This is the maximum amount of users who can enroll into the course.","nullable":true},"enrollmentThresDays":{"type":"integer","format":"int64","description":"This is the amount of days before the course that the enrollment is closed for the course.","nullable":true},"autoFillEnrollment":{"type":"boolean","description":"If the value is true, then when a slot opens in the enrollment list, it is filled automatically from the waitlist.","nullable":true},"waitlistRemainderSentTimestamp":{"type":"integer","format":"int64","description":"The time that the remainder of users on the waitlist was sent as a reminder.","nullable":true},"autoCompetency":{"type":"boolean","description":"If the value is true, then users are automatically evaluated in their competency at when they complete the course.","nullable":true},"classification":{"type":"string","description":"This is the unique ID of the classification for a learning item. It can be: It can be one of the following values: BLENDED, CONTINUOUS ONLINE ACCESS, EXTERNAL-COURSE, PHYSICAL GOOD, or TIME-BASED.,A learning item classification is a category of a course, one that explains - in general terms - how the course is offered. It used by the LMS for business rules. For example, users do not enroll into a physical good, but do enroll into a an instructor led course. You cannot change the set of values for classification (they are set by the LMS). It can be one of the following values: BLENDED: Blended items are partly led by an instructor and partly online computer based training. Often the online portion is self-paced. CONTINUOUS ONLINE ACCESS: Online courses are always available to users. EXTERNAL-COURSE: External Courses are courses that have come in through the Open Content Network (OCN). PHYSICAL GOOD: Other courses that are most often a physical material like a book or CD. TIME-BASED: Instructor-led courses are classroom based courses, but the classroom can be physical or virtual (a conference call).","nullable":true},"chargebackMethod":{"type":"string","description":"This is unique ID of a chargeback method.,Chargeback is a way to reconcile costs between organizations. One organization charges the cost of training back to another organization. This allows companies to balance the cost of training by putting the cost to organizations.","nullable":true},"catalogSKU":{"type":"string","description":"A Stock Keeping Unit (SKU) is a unique ID of an object in learning, used for commercial tracking, inventory, and account balancing.","nullable":true},"scheduleCanOverridePrice":{"type":"boolean","description":"If this value is true, then each instance of a course (scheduled offering) can override the price that is set in master copy of the course (learning item). If the value is false, then every course created from the master copy (learning item) inherits the price from the master copy.","nullable":true},"productionReady":{"type":"boolean","description":"If this value is true, then the learning item is ready to be assigned to users. If the value is false, then the learning item is under development and not yet ready for users.","nullable":true},"studentCanRecordLearningEvents":{"type":"boolean","description":"If the value of this is true, then the user can record learning events for this learning item. If the value is false, then only supervisors or administrators can record learning on the learning item.,In SuccessFactors Learning, when someone records a learning event, they are posting a users' completion or inability to complete a course back to the LMS. For example, you can record the fact that a user attended the course and completed it. Or, you can record the fact that a user did NOT complete the event. Completion is a highly configurable part of the LMS, so your completion statuses (the thing you are posting/recording) will be your own and match your business process.","nullable":true},"supervisorCanRecordLearningEvents":{"type":"boolean","description":"If the value of this is true, then the supervisor can record learning events for this learning item. If the value is false, then only administrators can record learning on the learning item. In most cases, when a supervisor cannot record learning, a user cannot record learning either.,In SuccessFactors Learning, when someone records a learning event, they are posting a users' completion or inability to complete a course back to the LMS. For example, you can record the fact that a user attended ription":"This is the description of a requirement type.,A requirement type is a way for companies to describe how a user can meet the requirement. For example, a user can finish a set amount of hours from within a pool of learning items.","nullable":true},"chargeBackMethodLabelID":{"type":"string","description":"This is unique ID of a chargeback method LABEL. Because you can offer courses in many languages, you can describe the chargeback in many languages. The system uses this label ID to look up the correct string to describe the chargeback method in the users' language.,Chargeback is a way to reconcile costs between organizations. One organization charges the cost of training back to another organization. This allows companies to balance the cost of training by putting the cost to organizations.","nullable":true},"componentClassificationLabelID":{"type":"string","description":"This is the unique ID of the label for the classification of this learning item. The LMS uses the label ID to look up the correct translation (string) of the classification for this user's language. For example, TIME-BASED is usually represented to English speakers as Instructor Led. The system uses an label ID to look up the string \"Instructor Led.\",A learning item classification is a category of a course, one that explains - in general terms - how the course is offered. It used by the LMS for business rules. For example, users do not enroll into a physical good, but do enroll into a an instructor led course. You cannot change the set of values for classification (they are set by the LMS). It can be one of the following values: BLENDED: Blended items are partly led by an instructor and partly online computer based training. Often the online portion is self-paced. CONTINUOUS ONLINE ACCESS: Online courses are always available to users. EXTERNAL-COURSE: External Courses are courses that have come in through the Open Content Network (OCN). PHYSICAL GOOD: Other courses that are most often a physical material like a book or CD. TIME-BASED: Instructor-led courses are classroom based courses, but the classroom can be physical or virtual (a conference call).","nullable":true},"forumID":{"type":"integer","format":"int64","description":"Forums are deprecated. Instead, use SAP Jam. If your learning item is associated with a deprecated forum, the ID appears here.","nullable":true},"rating":{"type":"number","format":"double","description":"This is the rating that users have given the learning item.","nullable":true},"enableRating":{"type":"boolean","description":"If the value of this is true, then users can rate the learning item. If it is false, then users cannot rate the learning item.","nullable":true},"includePreviousRevisionRating":{"type":"boolean","description":"If the value of this is true, then the overall rating includes ratings given to previous revisions of the learning item. If it is false, then the ratings are calculated from the current revision only.","nullable":true},"shippingRequired":{"type":"boolean","description":"If this value is true, then the learning item has some component that must be shipped. This is often the case if the learning item is a physical good, like a book. If it is false, then there is nothing to ship. For example, if this learning item is an online course, there is nothing to ship.","nullable":true},"selfEnrollment":{"type":"boolean","description":"If this value is true, then users can enroll themselves into this entity. If false, then they cannot enroll themselves. Enrollment is not necessarily automatic when this value is true. There could be an approval process attached to enrollment.","nullable":true},"isBlendedLearningRegisterRequired":{"type":"boolean","description":"If this value is true, then if the classification ID is BLENDED, then users must enroll for the learning item, even to see the online portions of the course. If it is false, then users can see the online portions without enrolling.","nullable":true},"eSigEnabled":{"type":"boolean","description":"If the value is true, then e-signatures are required for actions with this learning item. If false, then e-signatures are not required. E-signatures are a secondary identity verification for things like recording the completion of a learning item. They are typically used by companies that are audited by an oversight organization for learning compliance.","nullable":true},"isUserRequestsEnabled":{"type":"boolean","description":"If the value is true, then users can request a scheduled offering of a learning item. If false, they cannot request a new offering. Users request scheduled offerings when the current list of times that the learning item is offered does NOT include a time that they can attend the course.,A learning item is a unit of learning that you can track in the Learning Management System (LMS). You can think of this as a university course catalog: each course, like Introduction to Wave Physics is a learning item. Those learning items can be tracked to see who has completed Introduction to Wave Physics. And Introduction to Wave Physics can be offered at multiple times to fit different student schedules. Each of those instances is a scheduled offering.","nullable":true},"userCanWaitlist":{"type":"boolean","description":"If this value is true, then the user can get on the wait list for the course. If someone withdraws from the course, the system picks users in the order that they went onto the wait list. In a literal sense, this user can move himself/herself to the registration status of Waitlisted.","nullable":true},"componentTypeDesc":{"type":"string","description":"The descriptions of item types can help you determine how the item type assigns credit.","nullable":true},"enableOrder":{"type":"boolean","description":"If the value of this is true, then orders can be created for the entity (users can order it). If it is false, then orders cannot be created.","nullable":true},"checkAuthorizedInstructor":{"type":"boolean","description":"If the value is true, then the primary instructor of the segments must be authorized to teach the learning item. You set the learning items that an instructor is authorized to teach on the instructors' records. If it is false, then the primary instructor is not required to be authorized to teach the learning item. It is often false if you are not using instructor records or you are not keeping track of authorization to teach in the LMS.","nullable":true},"checklistEnabled":{"type":"boolean","description":"If the value of this is true, then task checklists are enabled for the learning item. Task checklists ask an observer to make sure that a user can complete a task in a series of steps.","nullable":true},"isAuthorizedObserver":{"type":"boolean","description":"If the value of this is true, then this user is an authorized observer for the task checklist attached to this learning item.","nullable":true},"checklistCompletionStatusID":{"type":"string","description":"This is the task checklist completion status ID. It is the completion status that the user is assigned if they pass the task checklist.","nullable":true},"checklistFailureStatusID":{"type":"string","description":"This is the task checklist failure status ID. It is the completion status that the user is assigned if they fail the task checklist.","nullable":true},"checklistObserverTypeID":{"type":"string","description":"Observer types define the task checklist observer.","nullable":true},"thumbnailURI":{"type":"string","description":"This is the URI that leads to the thumnail image for this entity. Thumbnails are images that act like icons: they help users understand something about the entity from a glance.","nullable":true},"classificationLabelValue":{"type":"string","description":"This is the translated name of the classification of this learning item. The LMS uses the label ID to look up the correct translation (string) of the classification for this user's language. For example, TIME-BASED is usually represented to English speakers as Instructor Led. The system uses a label ID to look up the string \"Instructor Led\" for English speaking users and returns the label value \"Instructor Led.\",A learning item classification is a category of a course, one that explains - in general terms - how the course is offered. It used by the LMS for business rules. For example, users do not enroll into a physical good, but do enroll into a an instructor led course. You cannot change the set of values for classification (they are set by the LMS). It can be one of the following values: BLENDED: Blended items are partly led by an instructor and partly online computer based training. Often the online portion is self-paced. CONTINUOUS ONLINE ACCESS: Online courses are always available to users. EXTERNAL-COURSE: External Courses are courses that have come in through the Open Content Network (OCN). PHYSICAL GOOD: Other courses that are most often a physical material like a book or CD. TIME-BASED: Instructor-led courses are classroom based courses, but the classroom can be physical or virtual (a conference call).","nullable":true},"chargebackMethodLabelValue":{"type":"string","description":"This is the description of the chargeback method in this user's language.,Chargeback is a way to reconcile costs between organizations. One organization charges the cost of training back to another organization. This allows companies to balance the cost of training by putting the cost to organizations.","nullable":true},"itemDetailsDeeplink":{"type":"string","description":"If you requested a deep link in your search for learning items, this is populated with the link to the learning item details page. Users click the link to see the details for this learning item. If they are not already authenticated to the system, they must authenticate before they can see the page.","nullable":true},"courseDeeplink":{"type":"string","description":"If you requested a deep link in your search for learning items, and if this learning item contains online content, then this is populated with the link to the online content. Users click the link to go to the online content for this learning item. If they are not already authenticated to the system, they must authenticate before they can see the page.","nullable":true},"lisCriteria":{"$ref":"#/components/schemas/V1_learningplan_service_lisCriteria","description":"The lisCriteria search critiera stands for learning item search (lis) criteria. It finds a specific learning item based on identifying criteria.","nullable":true},"prerequisites":{"type":"array","items":{"$ref":"#/components/schemas/V1_learningplan_service_LearningItemPrerequisite"},"description":"null,See item prerequisite entity for details. Navigation property.","nullable":true},"documents":{"type":"array","items":{"$ref":"#/components/schemas/V1_learningplan_service_LearningItemDocument"},"nullable":true,"description":"Navigation property."},"scheduledofferings":{"type":"array","items":{"$ref":"#/components/schemas/V1_learningplan_service_Scheduledoffering"},"nullable":true,"description":"Navigation property."}}},"V1_learningplan_service_LearningItemPrerequisite":{"type":"object","description":"This is the learning item's key. A learning item key is a concatenation of the learning item's unique ID, the learning item's type ID, and the learning item's revision date, separated by dashes. The key helps you uniquely identify one specific type and revision of a learning item.","required":["pkID"],"properties":{"pkID":{"type":"string","description":"This is the learning item's key. A learning item key is a concatenation of the learning item's unique ID, the learning item's type ID, and the learning item's revision date, separated by dashes. The key helps you uniquely identify one specific type and revision of a learning item.","nullable":true},"componentTypeID":{"type":"string","description":"Item type IDs are a critical categorization in because they determine how users are marked complete for a learning item. One item type can have completion statuses of pass and fail while another might have completion statuses of pass, fail and incomplete.","nullable":true},"componentID":{"type":"string","description":"This is the unique ID of a learning item.","nullable":true},"revisionDate":{"type":"integer","format":"int64","description":"This is the revision date of this entity. Learning items often have revision dates that correspond to a regulator's revision of compliance measures. Each later revision date is a later iteration of a learning item. The revision date is in Unix Epoch time.","nullable":true},"prerequisitesGroupItem":{"type":"array","items":{"$ref":"#/components/schemas/V1_learningplan_service_prerequisitesGroupItem"},"description":"A prerequisite is a learning item that must be complete before enrolling into this learning item. A group of prerequisites (prerequisite group) is an ordered list of prerequsites that users must complete in a given order. For example, to take a high level Physics course, you probably need to start with introduction to physics and work through a series of prerequisites before you are ready for the high level course. That series of courses is a prerequsite group.","nullable":true},"lisCriteria":{"$ref":"#/components/schemas/V1_learningplan_service_lisCriteria","description":"The lisCriteria search critiera stands for learning item search (lis) criteria. It finds a specific learning item based on identifying criteria.","nullable":true}}},"V1_learningplan_service_LearningItemDocument":{"type":"object","description":"This is the learning item's key. A learning item key is a concatenation of the learning item's unique ID, the learning item's type ID, and the learning item's revision date, separated by dashes. The key helps you uniquely identify one specific type and revision of a learning item.","required":["pkID"],"properties":{"pkID":{"type":"string","description":"This is the learning item's key. A learning item key is a concatenation of the learning item's unique ID, the learning item's type ID, and the learning item's revision date, separated by dashes. The key helps you uniquely identify one specific type and revision of a learning item.","nullable":true},"componentTypeID":{"type":"string","description":"Item type IDs are a critical categorization in because they determine how users are marked complete for a learning item. One item type can have completion statuses of pass and fail while another might have completion statuses of pass, fail and incomplete.","nullable":true},"componentID":{"type":"string","description":"This is the unique ID of a learning item.","nullable":true},"revisionDate":{"type":"integer","format":"int64","description":"This is the revision date of this entity. Learning items often have revision dates that correspond to a regulator's revision of compliance measures. Each later revision date is a later iteration of a learning item. The revision date is in Unix Epoch time.","nullable":true},"documentID":{"type":"string","description":"This is the unique ID of the document record. Documents are managed as separate objects in the system and then associated with learning item.","nullable":true},"reviewFlag":{"type":"boolean","description":"If the value of this is true, then the document should be reviewed for accuracy. Reviews are triggered when the document is revised. The review flag is set on the learning item or curricula, not on the document, because it is within the context of the learning item or curriculum that the document must be reviewed. Review to answer the question: does this new revision of the document fit with the current revision of the learning item or curriculum.","nullable":true},"documentTitle":{"type":"string","description":"This is the title of the document. The title is something that users recognize.","nullable":true},"documentLocation":{"type":"string","description":"This is a brief description of where n a user, supervisor, or administrator records completion with the Record Learning wizard.,Contact hours are the total number of hours that you expect a user to have contact with an instructor. For example, if you set up a blended learning item that has 8 total hours and, for 6 of those hours, you expect the user to be in an instructor-led segment, then the contact hours equals 6.,CPE is an abbreviation for \"Continuing Professional Education\" and refers to learning activities that users perform to maintain and expand the skills that their profession demands. Therefore, CPE hours are very much like credit hours, but the accumulation of CPE hours often leads to a professional certification.,Credit hours are the number of hours that a user earns for completing a learning event. For example, in many U.S. colleges, students attend a single class for 15 weeks, 3 days each week, and 1 hour each day. In this case, the total hours equals 45; however, the college grants 3 CREDIT HOURS for this class.","nullable":true},"cisCriteria":{"$ref":"#/components/schemas/Curriculum_Service_cisCriteria","description":"This is the search criteria.","nullable":true}}},"Admin_Search_Service_ENString":{"type":"string","enum":["String1","String2","String3"]},"Admin_Search_Service_criteria":{"type":"object","properties":{"programID":{"type":"string","nullable":true},"programTypeIDs":{"type":"string","nullable":true},"programTitle":{"type":"string","nullable":true},"domainIDs":{"type":"string","nullable":true},"active":{"type":"boolean","nullable":true}}},"Admin_Search_Service_scriteria":{"type":"object","description":"This is the unique ID of a user in the Learning Management System (LMS). This is recognized within the LMS only. If you want an ID that is recognized throughout SAP SuccessFactors HCM Suite, you want to get the Person GUID or Person External ID.","properties":{"learnerID":{"type":"string","description":"This is the unique ID of a user in the Learning Management System (LMS). T :{"type":"string","nullable":true},"sourceID":{"type":"string","nullable":true},"sourceDesc":{"type":"string","nullable":true},"deliveryMethodID":{"type":"string","nullable":true},"deliveryMethodDesc":{"type":"string","nullable":true},"totalLength":{"type":"number","format":"double","nullable":true},"creditHours":{"type":"number","format":"double","nullable":true},"cpeHours":{"type":"number","format":"double","nullable":true},"contactHours":{"type":"number","format":"double","nullable":true},"thumbnailURI":{"type":"string","nullable":true},"active":{"type":"boolean","nullable":true},"mobileReady":{"type":"string","nullable":true},"action":{"type":"string","nullable":true},"deeplink":{"type":"string","nullable":true},"SubjectAreasFeed":{"type":"array","items":{"$ref":"#/components/schemas/Admin_Catalog_Service_SubjectAreasFeed"},"nullable":true}}},"catalogService_ENString":{"type":"string","enum":["String1","String2","String3"]},"catalogService_criteria":{"type":"object","description":"This is a category set by the administrator. Categories help organize the catalog for your company.","properties":{"courseCategory":{"type":"string","description":"This is a category set by the administrator. Categories help organize the catalog for your company.","nullable":true},"showBlended":{"type":"boolean","description":"If set to true, the search looks for courses of classification BLENDED.,A learning item classification is a category of a course, one that explains - in general terms - how the course is offered. It used by the LMS for business rules. For example, users do not enroll into a physical good, but do enroll into a an instructor led course. You cannot change the set of values for classification (they are set by the LMS). It can be one of the following values: BLENDED: Blended items are partly led by an instructor and partly online computer based training. Often the online portion is self-paced. CONTINUOUS ONLINE ACCESS: Online courses are always available to users. EXTERNAL-COURSE: External Courses are courses that have come in through the Open Content Network (OCN). PHYSICAL GOOD: Other courses that are most often a physical material like a book or CD. TIME-BASED: Instructor-led courses are classroom based courses, but the classroom can be physical or virtual (a conference call).","nullable":true},"showSchedules":{"type":"boolean","description":"If this is set to true, the system returns item records that have schedule offerings and does not return any other records. Also, if you set it to true, the system does NOT return the details of the offering. If this is set to false, the system returns all the records. Default is false.","nullable":true},"selectedSubjectAreaID":{"type":"string","description":"A subject area is a tag on a course. For example, you can tag courses as SALES or IT. You can then search for all subject areas tagged with the SALES subject ID.","nullable":true},"selectedDeliveryMethodIDs":{"type":"string","description":"A delivery method is a category of how a company delivers a course. Companies set their own delivery methods.","nullable":true},"selectedComponentSourceIDs":{"type":"string","description":"A source identifies the developer of a course. Users see the source, so they can decide if they like courses developed by a particular source, they can search for additional courses by that same source.","nullable":true},"selectedStartDate":{"type":"integer","format":"int64","description":"The start date of the course. By default, this is null, so the start date is not limited. We recommend you send a start date of today to find courses that the user can enroll into.","nullable":true},"selectedEndDate":{"type":"integer","format":"int64","description":"This is the end date of the course.","nullable":true},"selectedFacilityIDs":{"type":"string","description":"A facility is a group of locations where training takes place. For example, a facility can be a building and the locations can be rooms in the building. Searching by facility helps users find training in a place they can easily attend instructor led training.","nullable":true},"offeringsInMyRegion":{"type":"boolean","description":"If you use regions, users can search for courses in their region. A region is a group of facilities. For example, if your facilities are buildings where training takes place, your regions can be metropolitan areas where you have facilities. For example, New York, Tokyo, Frankfurt, and so on. When users in the New York region search for courses in their region, the system returns courses in facilities that are in the New York region: close to the user who is running the search. By default, the search uses a value of false: the search is NOT limited by region.","nullable":true},"selectedRegionID":{"type":"string","description":"Users can also search in specific regions outside their own. If a user often travels from New York to Frankfurt, the user might want to search his or her own region but also in Frankfurt.","nullable":true},"searchPhrase":{"type":"string","description":"A text phrase that the system matches to courses in the catalog.","nullable":true},"pageSize":{"type":"integer","format":"int64","description":"The amount of records that the search should return in one page. By default, the value is 500.","nullable":true},"page":{"type":"integer","format":"int64","description":"The page that the search should return.","nullable":true},"sortOption":{"type":"integer","format":"int32","description":"This is the column that you want to sort your results by. To sort by title, the value is 1. To sort by price, the value is 2.To sort by tier, the value is 3. To sort by rating, the value is 4.To sort by featured, the value is 5. By default, the sort is by title.","nullable":true},"locale":{"type":"string","description":"This is the locale that you want to search. For example, English finds U.S. English (en-US) and Brazilian Portuguese finds Brazilian Portuguese (pt-BR). To see the full list of locale IDs, go to References > Geography > Locales.","nullable":true},"includeLearnerActions":{"type":"boolean","description":"If set to true, the system returns actions available to the learner for each learning item in the results. If set to false, actions will not be included in results. Default is false.","nullable":true}}},"catalogService_RatingInMap":{"type":"object","properties":{"key":{"type":"string","nullable":true},"value":{"type":"number","format":"double","nullable":true}}},"catalogService_CatalogItemStatus":{"type":"object","description":"The date that this is required to be complete. Users see this date as their deadline in their assignments.","properties":{"requiredDate":{"type":"integer","format":"int64","description":"The date that this is required to be complete. Users see this date as their deadline in their assignments.","nullable":true},"hasCurriculaAssigned":{"type":"boolean","description":"Does this learning item have curricula attached to it? In Catalog Item Status, THIS LEARNING ITEM is a unique term. It means the learning item that was returned through a catalog for this user.","nullable":true},"hasOnlinePart":{"type":"boolean","description":"If the learning item is assigned to a user and if it is online (computer based) or blended (some instructor segments and some online segments), then this is true. Otherwise, it is false.","nullable":true},"addUser":{"type":"string","description":"The user type who added the learning item. A is an administrator and P is a user (for example, a supervisor).","nullable":true},"addUsername":{"type":"string","description":"The username of the user who added this course to this users's assignments.","nullable":true},"isPrerequisitesSatisfied":{"type":"boolean","description":"If the value of this is true, then the user has completed the prerequisites for the learning item. Users must complete the prerequisites for some item to launch the content or enroll in the course.","nullable":true},"enrollmentStatusType":{"type":"string","description":"This field describes where the user is in the enrollment process. The possible values of this field are: E - User is actively enrolled in the system. This value is returned in some other services as ENROLL. W - User is waitlisted. Users on the waitlist become enrolled when enrolled users withdraw from the course. This value is returned in some other services as WAITLIST. P - User is pending enrollment. Users are most often pending because their enrollment is in the middle of an approval process. This value is returned in some other services as PENDING. C - The user has withdrawn, been withdrawn, or the enrollment has been cancelled for any reason. This value is returned in some other services as CANCELLED.","nullable":true},"hasVLSInsession":{"type":"boolean","description":"If the value of this is true, then the course has a Virtual Learning Service (VLS) in session. A VLS session is a virtual meeting with the instructor through a meeting room vendor like WebEx or Adobe Connect.","nullable":true},"hasPertinentScheduleSegmentInSession":{"type":"boolean","description":"If the learning item has a scheduled offering based on it, then this field tells you if there is a segment in session or not. Returns true if there is a segment in session. Else returns false.","nullable":true},"hasPertinentScheduleStarted":{"type":"boolean","description":"The value of this is true if the current time is between the a segment's scheduled start time and end time. Otherwise the value of this is false. This tells you if a part of the course is in session.","nullable":true},"pertinentScheduleEnrollmentSeatID":{"type":"integer","format":"int64","description":"This is the unique ID of the enrollment seat for the user in the current scheduled offering. The value is a number.","nullable":true},"onlineStatus":{"type":"integer","format":"int64","description":"This is the online status for the learning item. It describes whether the online content can be launched by the user and how it can be launched. The values can be a negative number: -1 means available. The content can be launched immediately. -2 means locked out. The content would otherwise be available, but the administrator or the system has locked the user out and the user cannot launch it. -3 means not available. The content is not available. This could be because there is no online content for the course -4 means launch during session. The content can be launched only during the time that is scheduled for the course. -5 means that the prerequisites have no been satisfied. The content is not available because the user has not satisfied a prerequisite. When the user satisfies the prerequisite the content becomes available unless some other reason blocks availability (for example, the content can also be launched during the session only). -6 means in progress. The user has already launched the content and is in the process of completing it.","nullable":true},"availableScheduleStatus":{"type":"integer","format":"int64","description":"This describes the users' status for enrollment into a scheduled offering (a set class time) for the course. The values can be negative numbers. -10 means that the user can enroll into the scheduled offering. -11 means that the user can waitlist into the scheduled offering. A waitlist is a way for users to indicate interest. When a spot opens up in the scheduled offering, users from the waitlist are first in line to be enrolled. -1 means that there is no available scheduled offering for this course.","nullable":true},"studentComponentID":{"type":"integer","format":"int64","description":"This is a unique ID (a key) that represents the association between a learning item or learning object to student. It is used when a component is assigned to a user. The system generates this unique ID to track the progress of the user in the course.","nullable":true},"isCheckListEnabled":{"type":"boolean","description":"If the value of this is true, then the ritical categorization in because they determine how users are marked complete for a learning item. One item type can have completion statuses of pass and fail while another might have completion statuses of pass, fail and incomplete.","nullable":true},"revisionDate":{"type":"integer","format":"int64","description":"This is the revision date of this entity. Learning items often have revision dates that correspond to a regulator's revision of compliance measures. Each later revision date is a later iteration of a learning item. The revision date is in Unix Epoch time.","nullable":true},"componentID":{"type":"string","description":"null","nullable":true},"componentTypeDesc":{"type":"string","description":"The descriptions of item types can help you determine how the item type assigns credit.","nullable":true},"componentClassification":{"type":"string","description":"This is the unique ID of the classification for a learning item. It can be: It can be one of the following values: BLENDED, CONTINUOUS ONLINE ACCESS, EXTERNAL-COURSE, PHYSICAL GOOD, or TIME-BASED.","nullable":true},"qualID":{"type":"string","description":"The Unique ID of a curriculum in the system.","nullable":true},"price":{"type":"number","format":"double","description":"The price of the entity. For example, the price of a scheduled offering: how much does it cost a user to enroll into and complete the scheduled offering?","nullable":true},"isBlendedLearningRegisterRequired":{"type":"boolean","description":"The price of the entity. For example, the price of a scheduled offering: how much does it cost a user to enroll into and complete the scheduled offering?","nullable":true},"enableOrder":{"type":"boolean","description":"If this value is true, then if the classification ID is BLENDED, then users must enroll for the learning item, even to see the online portions of the course. If it is false, then users can see the online portions without enrolling.","nullable":true},"chargebackMethod":{"type":"string", olleges, students attend a single class for 15 weeks, 3 days each week, and 1 hour each day. In this case, the total hours equals 45; however, the college grants 3 CREDIT HOURS for this class.","nullable":true},"cpeHours":{"type":"number","format":"double","description":"CPE is an abbreviation for \"Continuing Professional Education\" and refers to learning activities that users perform to maintain and expand the skills that their profession demands. Therefore, CPE hours are very much like credit hours, but the accumulation of CPE hours often leads to a professional certification.","nullable":true},"contactHours":{"type":"number","format":"double","description":"Contact hours are the total number of hours that you expect a user to have contact with an instructor. For example, if you set up a blended learning item that has 8 total hours and, for 6 of those hours, you expect the user to be in an instructor-led segment, then the contact hours equals 6.","nullable":true},"totalHours":{"type":"number","format":"double","description":"This is the total hours that a user earns for completing a course.","nullable":true},"instructorName":{"type":"string","description":"This is the name of the instructor who taught the course.","nullable":true},"comments":{"type":"string","description":"This is comments about the learning event.","nullable":true}}},"Admin_Learning_Event_Service_ExternalLearningEvent":{"type":"object","description":"This is a set of external learning events, usually posted to SAP SuccessFactors Learning to provide completion record info Learning Management System (LMS)","properties":{"externalLearningEvents":{"type":"array","items":{"$ref":"#/components/schemas/Admin_Learning_Event_Service_ExternalLearningEvents"},"description":"This is a set of external learning events, usually posted to SAP SuccessFactors Learning to provide completion record info Learning Management System (LMS)","nullable":true}}},"Admin_Learning_Event_Service_OCNLearningEvent":{"type":"ob
