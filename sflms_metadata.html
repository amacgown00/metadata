r company.","properties":{"courseCategory":{"type":"string","description":"This is a category set by the administrator. Categories help organize the catalog for your company.","nullable":true},"showBlended":{"type":"boolean","description":"If set to true, the search looks for courses of classification BLENDED.,A learning item classification is a category of a course, one that explains - in general terms - how the course is offered. It used by the LMS for business rules. For example, users do not enroll into a physical good, but do enroll into a an instructor led course. You cannot change the set of values for classification (they are set by the LMS). It can be one of the following values: BLENDED: Blended items are partly led by an instructor and partly online computer based training. Often the online portion is self-paced. CONTINUOUS ONLINE ACCESS: Online courses are always available to users. EXTERNAL-COURSE: External Courses are courses that have come in through the Open Content Network (OCN). PHYSICAL GOOD: Other courses that are most often a physical material like a book or CD. TIME-BASED: Instructor-led courses are classroom based courses, but the classroom can be physical or virtual (a conference call).","nullable":true},"showSchedules":{"type":"boolean","description":"If this is set to true, the system returns item records that have schedule offerings and does not return any other records. Also, if you set it to true, the system does NOT return the details of the offering. If this is set to false, the system returns all the records. Default is false.","nullable":true},"selectedSubjectAreaID":{"type":"string","description":"A subject area is a tag on a course. For example, you can tag courses as SALES or IT. You can then search for all subject areas tagged with the SALES subject ID.","nullable":true},"selectedDeliveryMethodIDs":{"type":"string","description":"A delivery method is a category of how a company delivers a course. Companies set their own delivery methods.","nullable":true},"selectedComponentSourceIDs":{"type":"string","description":"A source identifies the developer of a course. Users see the source, so they can decide if they like courses developed by a particular source, they can search for additional courses by that same source.","nullable":true},"selectedStartDate":{"type":"integer","format":"int64","description":"The start date of the course. By default, this is null, so the start date is not limited. We recommend you send a start date of today to find courses that the user can enroll into.","nullable":true},"selectedEndDate":{"type":"integer","format":"int64","description":"This is the end date of the course.","nullable":true},"selectedFacilityIDs":{"type":"string","description":"A facility is a group of locations where training takes place. For example, a facility can be a building and the locations can be rooms in the building. Searching by facility helps users find training in a place they can easily attend instructor led training.","nullable":true},"offeringsInMyRegion":{"type":"boolean","description":"If you use regions, users can search for courses in their region. A region is a group of facilities. For example, if your facilities are buildings where training takes place, your regions can be metropolitan areas where you have facilities. For example, New York, Tokyo, Frankfurt, and so on. When users in the New York region search for courses in their region, the system returns courses in facilities that are in the New York region: close to the user who is running the search. By default, the search uses a value of false: the search is NOT limited by region.","nullable":true},"selectedRegionID":{"type":"string","description":"Users can also search in specific regions outside their own. If a user often travels from New York to Frankfurt, the user might want to search his or her own region but also in Frankfurt.","nullable":true},"searchPhrase":{"type":"string","description":"A text phrase that the system matches to courses in the catalog.","nullable":true},"pageSize":{"type":"integer","format":"int64","description":"The amount of records that the search should return in one page. By default, the value is 500.","nullable":true},"page":{"type":"integer","format":"int64","description":"The page that the search should return.","nullable":true},"sortOption":{"type":"integer","format":"int32","description":"This is the column that you want to sort your results by. To sort by title, the value is 1. To sort by price, the value is 2.To sort by tier, the value is 3. To sort by rating, the value is 4.To sort by featured, the value is 5. By default, the sort is by title.","nullable":true},"locale":{"type":"string","description":"This is the locale that you want to search. For example, English finds U.S. English (en-US) and Brazilian Portuguese finds Brazilian Portuguese (pt-BR). To see the full list of locale IDs, go to References > Geography > Locales.","nullable":true},"includeLearnerActions":{"type":"boolean","description":"If set to true, the system returns actions available to the learner for each learning item in the results. If set to false, actions will not be included in results. Default is false.","nullable":true}}},"catalogSearch_RatingInMap":{"type":"object","properties":{"key":{"type":"string","nullable":true},"value":{"type":"number","format":"double","nullable":true}}},"catalogSearch_CatalogItemStatus":{"type":"object","description":"The date that this is required to be complete. Users see this date as their deadline in their assignments.","properties":{"requiredDate":{"type":"integer","format":"int64","description":"The date that this is required to be complete. Users see this date as their deadline in their assignments.","nullable":true},"hasCurriculaAssigned":{"type":"boolean","description":"Does this learning item have curricula attached to it? In Catalog Item Status, THIS LEARNING ITEM is a unique term. It means the learning item that was returned through a catalog for this user.","nullable":true},"hasOnlinePart":{"type":"boolean","description":"If the learning item is assigned to a user and if it is online (computer based) or blended (some instructor segments and some online segments), then this is true. Otherwise, it is false.","nullable":true},"addUser":{"type":"string","description":"The user type who added the learning item. A is an administrator and P is a user (for example, a supervisor).","nullable":true},"addUsername":{"type":"string","description":"The username of the user who added this course to this users's assignments.","nullable":true},"isPrerequisitesSatisfied":{"type":"boolean","description":"If the value of this is true, then the user has completed the prerequisites for the learning item. Users must complete the prerequisites for some item to launch the content or enroll in the course.","nullable":true},"enrollmentStatusType":{"type":"string","description":"This field describes where the user is in the enrollment process. The possible values of this field are: E - User is actively enrolled in the system. This value is returned in some other services as ENROLL. W - User is waitlisted. Users on the waitlist become enrolled when enrolled users withdraw from the course. This value is returned in some other services as WAITLIST. P - User is pending enrollment. Users are most often pending because their enrollment is in the middle of an approval process. This value is returned in some other services as PENDING. C - The user has withdrawn, been withdrawn, or the enrollment has been cancelled for any reason. This value is returned in some other services as CANCELLED.","nullable":true},"hasVLSInsession":{"type":"boolean","description":"If the value of this is true, then the course has a Virtual Learning Service (VLS) in session. A VLS session is a virtual meeting with the instructor through a meeting room vendor like WebEx or Adobe Connect.","nullable":true},"hasPertinentScheduleSegmentInSession":{"type":" const schemas = (spec.components && spec.components.schemas) || {};
const methods = new Set(['get','post','put','patch','delete']);
const state = { activePane:'left', left:{service:null, selected:0}, right:{service:null, selected:0}, filter:'' };
function esc(value){ return String(value == null ? '' : value).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function refName(ref){ return ref ? String(ref).split('/').pop() : null; }
function titleCaseLastPath(path){ const clean = String(path||'').split('/').filter(Boolean).pop() || path || ''; return clean; }
function normalizeService(tag){
  let s = String(tag || 'untagged');
  s = s.replace(/^V\d+-/i,'').replace(/^Admin-/i,'');
  if (/User-Learning-Service/i.test(s)) return 'userlearning-service';
  if (/Learning-Event-Service/i.test(s)) return 'learningevent-service';
  return s.replace(/-item-completion/i,'').replace(/-Service$/i,'-service');
}
function schemaType(schema){
  if(!schema) return 'unknown';
  if(schema.$ref) return refName(schema.$ref);
  if(schema.type === 'array') return 'array<' + schemaType(schema.items || {}) + '>';
  if(schema.format) return (schema.type || 'object') + ':' + schema.format;
  return schema.type || 'object';
}
function responseSchema(operation){
  const responses = operation.responses || {};
  const response = responses['200'] || responses['201'] || Object.values(responses)[0] || {};
  const content = response.content || {};
  const json = content['application/json'] || content['application/json;odata.metadata=minimal'] || Object.values(content)[0];
  return json && json.schema ? json.schema : null;
}
function responseComponents(operation){
  const schema = responseSchema(operation);
  if(!schema) return [];
  if(schema.$ref) return [refName(schema.$ref)];
  if(schema.type === 'array' && schema.items && schema.items.$ref) return [refName(schema.items.$ref)];
  const value = schema.properties && schema.properties.value;
  if(value && value.items && value.items.$ref) return [refName(value.items.$ref)];
  return [];
}
function inputRefsForReturn(returnName){
  const schema = schemas[returnName] || {};
  const props = schema.properties || {};
  const out = [];
  Object.keys(props).forEach(name => {
    const p = props[name] || {};
    const lname = name.toLowerCase();
    let ref = null;
    if(p.$ref) ref = refName(p.$ref);
    else if(p.items && p.items.$ref) ref = refName(p.items.$ref);
    if(ref && lname.includes('criteria')) out.push({propName:name, schemaName:ref});
  });
  return out;
}
const serviceMap = new Map();
Object.keys(spec.paths || {}).forEach(path => {
  const pathItem = spec.paths[path] || {};
  Object.keys(pathItem).forEach(method => {
    if(!methods.has(method)) return;
    const op = pathItem[method] || {};
    const tag = (op.tags && op.tags[0]) || 'untagged';
    const service = normalizeService(tag);
    const returns = responseComponents(op);
    returns.forEach(ret => {
      const inputRefs = inputRefsForReturn(ret);
      // Only show real input complex types where possible; still include an endpoint if no criteria so the service is not empty.
      const base = {service, tag, path, method:method.toUpperCase(), summary:op.summary || '', operationId:op.operationId || '', entity:titleCaseLastPath(path), returnSchema:ret};
      if(inputRefs.length){
        inputRefs.forEach(inp => addEndpoint({...base, inputLabel:inp.propName, inputSchema:inp.schemaName}));
      } else {
        addEndpoint({...base, inputLabel:'no input schema', inputSchema:null});
      }
    });
  });
});
function addEndpoint(entry){
  if(!serviceMap.has(entry.service)) serviceMap.set(entry.service, []);
  serviceMap.get(entry.service).push(entry);
}
const services = Array.from(serviceMap.keys());
function shortSchemaName(name){
  if(!name) return '';
  const parts = String(name).split('_');
  return parts[parts.length-1] || name;
}
function renderProps(schemaName, opts={}){
  if(!schemaName || !schemas[schemaName]) return '<div class="empty">No schema properties found.</div>';
  const seen = opts.seen || new Set();
  if(seen.has(schemaName)) return '';
  seen.add(schemaName);
  const props = (schemas[schemaName] || {}).properties || {};
  const names = Object.keys(props);
  if(!names.length) return '<div class="empty">No properties.</div>';
  return names.map(name => {
    const p = props[name] || {};
    const type = schemaType(p);
    return '<div class="prop"><span class="propName">'+esc(name)+'</span><span class="propType">'+esc(type)+'</span></div>';
  }).join('');
}
function renderPane(which){
  const pane = state[which];
  const entries = serviceMap.get(pane.service) || [];
  const selected = entries[Math.min(pane.selected, Math.max(entries.length-1,0))];
  const pathText = selected ? selected.path : '';
  document.getElementById(which+'Path').innerHTML = pathText
    ? '<span class="pathText">'+esc(pathText)+'</span><button class="copyPathButton" type="button" data-copy-path="'+which+'" aria-label="Copy endpoint path">Copy</button>'
    : '<span class="pathText"></span>';
  const inputEl = document.getElementById(which+'Inputs');
  const returnEl = document.getElementById(which+'Returns');
  if(!entries.length){
    inputEl.innerHTML = '<div class="empty">No endpoints found for this service.</div>';
    returnEl.innerHTML = '<div class="empty">Select a service.</div>';
    return;
  }
  inputEl.innerHTML = entries.map((e, i) => {
    const selectedClass = i === pane.selected ? ' selected' : '';
    const props = e.inputSchema ? '<div class="props">'+renderProps(e.inputSchema)+'</div>' : '<div class="note">This endpoint does not expose a criteria/input complex type in the spec.</div>';
    return '<div class="typeBlock'+selectedClass+'">'
      + '<button class="typeButton" data-pane="'+which+'" data-index="'+i+'">'+esc(e.inputLabel)+'<span class="typeSuffix">'+esc(e.entity)+'</span></button>'
      + (i === pane.selected ? props : '')
      + '</div>';
  }).join('');
  if(selected){
    returnEl.innerHTML = '<div class="schemaHeading">'+esc(shortSchemaName(selected.returnSchema))+'</div>'
      + '<div class="returnProps">'+renderProps(selected.returnSchema)+'</div>';
  }
}
function renderTabs(){
  const q = state.filter.trim().toLowerCase();
  const filtered = services.filter(s => {
    if(!q) return true;
    if(s.toLowerCase().includes(q)) return true;
    return (serviceMap.get(s) || []).some(e => [e.path,e.entity,e.inputLabel,e.inputSchema,e.returnSchema,e.summary].join(' ').toLowerCase().includes(q));
  });
  document.getElementById('count').textContent = filtered.length + ' services';
  document.getElementById('tabs').innerHTML = filtered.map(s => {
    const cls = (s === state.left.service ? ' active-left' : '') + (s === state.right.service ? ' active-right' : '');
    return '<button class="tab'+cls+'" data-service="'+esc(s)+'">'+esc(s)+'</button>';
  }).join('');
}
function renderAll(){ renderTabs(); renderPane('left'); renderPane('right'); }
function flashCopyButton(btn, copied){
  const original = 'Copy';
  btn.textContent = copied ? 'Copied' : original;
  btn.title = copied ? 'Copied endpoint path' : 'Unable to copy endpoint path';
  window.clearTimeout(btn._copyTimer);
  btn._copyTimer = window.setTimeout(() => {
    btn.textContent = original;
    btn.title = '';
  }, 1200);
}
function fallbackCopyPath(text, btn){
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.setAttribute('readonly','');
  textarea.style.position = 'fixed';
  textarea.style.top = '-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  let copied = false;
  try { copied = document.execCommand('copy'); } catch(err) { copied = false; }
  document.body.removeChild(textarea);
  flashCopyButton(btn, copied);
}
function copyPath(text, btn){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(() => flashCopyButton(btn, true), () => fallbackCopyPath(text, btn));
  } else {
    fallbackCopyPath(text, btn);
  }
}
function loadService(which, service){
  state[which].service = service;
  state[which].selected = 0;
  renderAll();
}
document.addEventListener('click', e => {
  const copyBtn = e.target.closest('.copyPathButton');
  if(copyBtn){
    const paneName = copyBtn.getAttribute('data-copy-path');
    const pane = state[paneName];
    const entries = pane ? serviceMap.get(pane.service) || [] : [];
    const selected = entries[Math.min(pane.selected, Math.max(entries.length-1,0))];
    if(selected) copyPath(selected.path, copyBtn);
    return;
  }
  const tab = e.target.closest('.tab');
  if(tab){ loadService(state.activePane, tab.getAttribute('data-service')); return; }
  const btn = e.target.closest('.typeButton');
  if(btn){
    const pane = btn.getAttribute('data-pane');
    state[pane].selected = Number(btn.getAttribute('data-index')) || 0;
    renderPane(pane);
    renderTabs();
  }
});
document.getElementById('loadLeft').addEventListener('click', () => { state.activePane='left'; document.getElementById('loadLeft').classList.add('selected'); document.getElementById('loadRight').classList.remove('selected'); });
document.getElementById('loadRight').addEventListener('click', () => { state.activePane='right'; document.getElementById('loadRight').classList.add('selected'); document.getElementById('loadLeft').classList.remove('selected'); });
document.getElementById('search').addEventListener('input', e => { state.filter = e.target.value; renderTabs(); });
state.left.service = services[0] || null;
state.right.service = services[1] || services[0] || null;
renderAll();
</script>
